<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portail Documentaire</title>
    <style>
        :root { --primary: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; text-align: center; }
        .card:hover { transform: translateY(-5px); }
        .btn { display: inline-block; background: #3498db; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-top: 15px; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mes Ressources PDF</h1>
        <p>Cliquez sur un document pour le consulter ou le télécharger.</p>
        
        <div class="grid">
            <div class="card">
                <h3>Guide Utilisateur</h3>
                <p>Format: PDF</p>
                <a href="guide.pdf" class="btn" target="_blank">Consulter</a>
            </div>

            <div class="card">
                <h3>Rapport Annuel</h3>
                <p>Format: PDF</p>
                <a href="rapport.pdf" class="btn" target="_blank">Consulter</a>
            </div>
        </div>
    </div>
</body>
</html>
